<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <title>Acesso - Passômetro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --bg-claro: #e3f2fd; }
        [data-bs-theme="light"] body { background-color: var(--bg-claro) !important; }
        [data-bs-theme="dark"] body { background-color: #121212 !important; color: #e0e0e0; }
        [data-bs-theme="dark"] .card { background-color: #1e1e1e !important; border: 1px solid #333; }
        [data-bs-theme="dark"] .text-dark { color: #f8f9fa !important; }
        [data-bs-theme="dark"] .form-control { background-color: #2a2a2a; color: #fff; border-color: #444; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center" style="height: 100vh; transition: background-color 0.3s ease;">
    <div class="card shadow p-4" style="width: 380px;">
        <div class="text-center mb-4">
            <h3 class="text-primary fw-bold mb-0">HMINSN</h3>
            <span class="text-muted">Acesso Restrito</span>
        </div>
        
        {% if erro %} <div class="alert alert-danger p-2 text-center">{{ erro }}</div> {% endif %}
        
        <form method="POST">
            <div class="mb-3">
                <label class="form-label fw-bold">CPF (Somente Números)</label>
                <input type="text" name="cpf" class="form-control" placeholder="Ex: 12345678900" pattern="\d{11}" maxlength="11" required autofocus>
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold">Senha</label>
                <input type="password" name="senha" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 mb-2 fw-bold py-2">Entrar no Sistema</button>
            <a href="/" class="btn btn-outline-secondary w-100">Voltar para Visão Geral</a>
        </form>
    </div>
    <script>
        if (localStorage.getItem('tema') === 'dark') document.documentElement.setAttribute('data-bs-theme', 'dark');
    </script>
</body>
</html>
