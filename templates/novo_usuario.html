<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <title>Novo Usuário</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --cor-primaria: #005b96; --cor-secundaria: #03396c; --bg-claro: #f0f4f8; }
        [data-bs-theme="light"] body { background-color: var(--bg-claro) !important; }
        [data-bs-theme="dark"] body { background-color: #121212 !important; color: #e0e0e0; }
        [data-bs-theme="dark"] .card { background-color: #1e1e1e !important; border: 1px solid #333; }
        [data-bs-theme="dark"] .form-control, [data-bs-theme="dark"] .form-select { background-color: #2a2a2a; color: #fff; border-color: #444; }
        .navbar-custom { background: linear-gradient(90deg, var(--cor-primaria), var(--cor-secundaria)) !important; }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="card shadow-sm mx-auto" style="max-width: 500px;">
            <div class="card-body">
                <h4 class="mb-3 text-primary fw-bold">Cadastrar Operador</h4>
                {% if erro %} <div class="alert alert-danger">{{ erro }}</div> {% endif %}
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">CPF (Somente números)</label>
                        <input type="text" name="cpf" class="form-control" pattern="\d{11}" maxlength="11" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Nome Completo</label>
                        <input type="text" name="nome" class="form-control" required>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Cargo</label>
                            <select name="cargo" class="form-select" required>
                                <option value="Enfermeiro(a)">Enfermeiro(a)</option>
                                {% if session.get('usuario_cargo') == 'Global Admin' %}
                                <option value="Coord. de Ala">Coord. de Ala</option>
                                {% endif %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Setor</label>
                            <select name="setor" class="form-select" required>
                                <option value="Todos">Todos</option>
                                <option value="Girassóis">Girassóis</option>
                                <option value="Azaléias">Azaléias</option>
                                <option value="Margaridas">Margaridas</option>
                                <option value="Orquídeas">Orquídeas</option>
                                <option value="Rosas">Rosas</option>
                                <option value="Acolhimento/Emergência">Emergência</option>
                                <option value="Centro Cirúrgico">Centro Cirúrgico</option>
                                <option value="UTI Neo">UTI Neo</option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold">Senha Inicial</label>
                        <input type="text" name="senha" class="form-control" value="mudar123" required>
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="/admin" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-primary fw-bold">Salvar Usuário</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script>if (localStorage.getItem('tema') === 'dark') document.documentElement.setAttribute('data-bs-theme', 'dark');</script>
</body>
</html>
