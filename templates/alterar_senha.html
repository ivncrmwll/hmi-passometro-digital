<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <title>Alterar Senha</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --bg-claro: #f0f4f8; }
        [data-bs-theme="light"] body { background-color: var(--bg-claro) !important; }
        [data-bs-theme="dark"] body { background-color: #121212 !important; color: #e0e0e0; }
        [data-bs-theme="dark"] .card { background-color: #1e1e1e !important; border: 1px solid #333; }
        [data-bs-theme="dark"] .form-control { background-color: #2a2a2a; color: #fff; border-color: #444; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="card shadow p-4" style="width: 350px;">
        <h4 class="text-center text-primary fw-bold mb-4">Alterar Senha</h4>
        {% if erro %} <div class="alert alert-danger p-2 text-center">{{ erro }}</div> {% endif %}
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3">
                <label class="form-label fw-bold">Senha Atual</label>
                <input type="password" name="senha_atual" class="form-control" required autofocus>
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold">Nova Senha</label>
                <input type="password" name="nova_senha" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-bold mb-2">Salvar Nova Senha</button>
            <a href="/" class="btn btn-outline-secondary w-100">Cancelar</a>
        </form>
    </div>
    <script>if (localStorage.getItem('tema') === 'dark') document.documentElement.setAttribute('data-bs-theme', 'dark');</script>
</body>
</html>
