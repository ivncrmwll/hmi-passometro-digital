<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <title>Transferir Paciente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --bg-claro: #f0f4f8; }
        [data-bs-theme="light"] body { background-color: var(--bg-claro) !important; }
        [data-bs-theme="dark"] body { background-color: #121212 !important; color: #e0e0e0; }
        [data-bs-theme="dark"] .card { background-color: #1e1e1e !important; border: 1px solid #333; }
        [data-bs-theme="dark"] .form-control, [data-bs-theme="dark"] .form-select { background-color: #2a2a2a; color: #fff; border-color: #444; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="card shadow p-4" style="width: 400px;">
        <h4 class="text-warning fw-bold mb-3">🔄 Transferir de Ala</h4>
        <p class="mb-3">Paciente: <strong>{{ paciente.nome_paciente }}</strong><br>Atual: {{ paciente.setor }} (Leito {{ paciente.leito }})</p>
        <form method="POST">
            <div class="mb-3">
                <label class="form-label fw-bold">Nova Ala / Setor</label>
                <select name="novo_setor" class="form-select" required>
                    <option value="Girassóis">Girassóis</option>
                    <option value="Azaléias">Azaléias</option>
                    <option value="Margaridas">Margaridas</option>
                    <option value="Orquídeas">Orquídeas</option>
                    <option value="Rosas">Rosas</option>
                    <option value="Acolhimento/Emergência">Emergência</option>
                    <option value="Centro Cirúrgico">Centro Cirúrgico</option>
                    <option value="UTI Neo">UTI Neo</option>
                </select>
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold">Novo Leito</label>
                <input type="text" name="novo_leito" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-warning w-100 fw-bold mb-2">Confirmar Transferência</button>
            <a href="/" class="btn btn-outline-secondary w-100">Cancelar</a>
        </form>
    </div>
    <script>if (localStorage.getItem('tema') === 'dark') document.documentElement.setAttribute('data-bs-theme', 'dark');</script>
</body>
</html>
