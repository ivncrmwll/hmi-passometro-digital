<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <title>Registrar Evasão</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --bg-claro: #f0f4f8; }
        [data-bs-theme="light"] body { background-color: var(--bg-claro) !important; }
        [data-bs-theme="dark"] body { background-color: #121212 !important; color: #e0e0e0; }
        [data-bs-theme="dark"] .card { background-color: #1e1e1e !important; border: 1px solid #333; }
        [data-bs-theme="dark"] .form-control { background-color: #2a2a2a; color: #fff; border-color: #444; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="card shadow p-4 border-secondary" style="width: 450px;">
        <h4 class="text-secondary fw-bold mb-3">🚶 Registrar Evasão</h4>
        <p class="text-muted mb-3">Você está registrando a evasão de <strong>{{ paciente.nome_paciente }}</strong> do setor {{ paciente.setor }}. Esta ação é auditável.</p>
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-4">
                <label class="form-label fw-bold text-danger">Motivo da Evasão (Obrigatório)</label>
                <textarea name="motivo" class="form-control" rows="4" placeholder="Descreva os detalhes e o horário notado..." required autofocus></textarea>
            </div>
            <button type="submit" class="btn btn-secondary w-100 fw-bold mb-2">Confirmar Evasão</button>
            <a href="/" class="btn btn-outline-secondary w-100">Cancelar</a>
        </form>
    </div>
    <script>if (localStorage.getItem('tema') === 'dark') document.documentElement.setAttribute('data-bs-theme', 'dark');</script>
</body>
</html>
